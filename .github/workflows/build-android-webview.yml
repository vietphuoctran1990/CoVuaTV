# Build Android TV/Phone APK from web/ (WebView wrapper)
name: Build Android APK (WebView)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "android-webview/**"
      - ".github/workflows/build-android-webview.yml"

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Sync web → android assets
        run: |
          set -euo pipefail
          WWW="android-webview/app/src/main/assets/www"
          rm -rf "$WWW"
          mkdir -p "$WWW"
          cp -a web/. "$WWW/"
          # ensure icons exist (already in repo if generated)
          ls -la "$WWW" | head
          test -f "$WWW/index.html"

      - name: Assemble debug APK
        working-directory: android-webview
        run: |
          set -euo pipefail
          gradle assembleDebug --no-daemon --stacktrace
          find . -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doraemon-chess-tv-apk
          path: android-webview/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          echo "### APK WebView" >> "$GITHUB_STEP_SUMMARY"
          echo "Sideload lên Xiaomi TV: bật Unknown sources → USB/ADB install." >> "$GITHUB_STEP_SUMMARY"
          ls -lh android-webview/app/build/outputs/apk/debug/ || true
