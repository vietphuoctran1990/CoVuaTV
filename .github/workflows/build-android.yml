# Build APK trên GitHub Actions — không cần Android SDK trên máy local.
# Cách chạy: tab Actions → "Build Android APK" → Run workflow
# Tải artifact "doraemon-chess-tv-apk" sau khi job xanh.

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: "Godot version (match export templates)"
        required: true
        default: "4.7.1"
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master]

env:
  GODOT_VERSION: ${{ github.event.inputs.godot_version || '4.7.1' }}
  EXPORT_PRESET: Android
  APK_NAME: DoraemonChessTV.apk
  # Debug keystore (chỉ dùng sideload gia đình — không đưa lên Play Store)
  DEBUG_KEYSTORE_PASS: android
  DEBUG_KEYSTORE_ALIAS: androiddebugkey
  DEBUG_KEYSTORE_USER: androiddebugkey

jobs:
  smoke-test:
    name: Smoke test (logic cờ)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot (Linux)
        run: |
          set -euo pipefail
          VER="${GODOT_VERSION}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}-stable/Godot_v${VER}-stable_linux.x86_64.zip"
          echo "Downloading $URL"
          curl -fL --retry 3 -o godot.zip "$URL"
          unzip -q godot.zip
          GODOT_BIN=$(find . -maxdepth 1 -type f -name "Godot_v*-stable_linux.x86_64" | head -n1)
          chmod +x "$GODOT_BIN"
          sudo mv "$GODOT_BIN" /usr/local/bin/godot
          godot --version

      - name: Import project + run smoke test
        run: |
          set -euo pipefail
          # Import assets (.godot) — bắt buộc trước export
          godot --headless --path . --import || true
          godot --headless --path . --quit-after 2 || true
          godot --headless --path . --script res://tests/smoke_test.gd

  build-apk:
    name: Export Android APK
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Download Godot (Linux)
        run: |
          set -euo pipefail
          VER="${GODOT_VERSION}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}-stable/Godot_v${VER}-stable_linux.x86_64.zip"
          curl -fL --retry 3 -o godot.zip "$URL"
          unzip -q godot.zip
          GODOT_BIN=$(find . -maxdepth 1 -type f -name "Godot_v*-stable_linux.x86_64" | head -n1)
          chmod +x "$GODOT_BIN"
          sudo mv "$GODOT_BIN" /usr/local/bin/godot
          godot --version

      - name: Download & install export templates
        run: |
          set -euo pipefail
          VER="${GODOT_VERSION}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}-stable/Godot_v${VER}-stable_export_templates.tpz"
          curl -fL --retry 3 -o templates.tpz "$URL"
          mkdir -p "$HOME/.local/share/godot/export_templates/${VER}.stable"
          # tpz is a zip
          unzip -q templates.tpz -d /tmp/godot_templates
          # Contents usually under templates/
          if [ -d /tmp/godot_templates/templates ]; then
            cp -r /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/${VER}.stable/"
          else
            cp -r /tmp/godot_templates/* "$HOME/.local/share/godot/export_templates/${VER}.stable/"
          fi
          ls -la "$HOME/.local/share/godot/export_templates/${VER}.stable/" | head

      - name: Create debug keystore + editor settings
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android" "$HOME/.config/godot" build/android
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass "${DEBUG_KEYSTORE_PASS}" \
            -alias "${DEBUG_KEYSTORE_ALIAS}" \
            -keypass "${DEBUG_KEYSTORE_PASS}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            # android-actions/setup-android default
            for c in "$HOME/android-sdk" "$HOME/Android/Sdk" "/usr/local/lib/android/sdk"; do
              if [ -d "$c" ]; then SDK="$c"; break; fi
            done
          fi
          echo "Using Android SDK: $SDK"
          test -n "$SDK" && test -d "$SDK"

          # Write Godot 4 editor settings (no leading indent)
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"${SDK}\""
            echo "export/android/debug_keystore = \"${HOME}/.android/debug.keystore\""
            echo "export/android/debug_keystore_user = \"${DEBUG_KEYSTORE_USER}\""
            echo "export/android/debug_keystore_pass = \"${DEBUG_KEYSTORE_PASS}\""
          } > "$HOME/.config/godot/editor_settings-4.tres"
          # Godot 4.x may also look for versioned settings files
          cp "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.3.tres" || true
          cp "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.4.tres" || true
          cp "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.5.tres" || true
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Import project assets
        run: |
          set -euo pipefail
          godot --headless --path . --import || true
          godot --headless --path . --quit-after 3 || true

      - name: Export APK (debug)
        run: |
          set -euo pipefail
          mkdir -p build/android
          # --export-debug dùng debug keystore, phù hợp sideload TV gia đình
          godot --headless --path . --export-debug "${EXPORT_PRESET}" "build/android/${APK_NAME}"
          ls -lh build/android/
          test -f "build/android/${APK_NAME}"
          file "build/android/${APK_NAME}" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: doraemon-chess-tv-apk
          path: build/android/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          echo "### APK sẵn sàng" >> "$GITHUB_STEP_SUMMARY"
          echo "- File: \`build/android/${APK_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tải artifact **doraemon-chess-tv-apk** trong tab job" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cài lên Xiaomi TV: USB / ADB (bật Unknown sources)" >> "$GITHUB_STEP_SUMMARY"
          ls -lh "build/android/${APK_NAME}" >> "$GITHUB_STEP_SUMMARY"
